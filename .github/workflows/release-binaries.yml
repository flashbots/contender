name: release-binaries

# Build and upload native binaries as GitHub release assets.
# This workflow complements the existing release.yml by providing
# a standalone, focused binary-build pipeline that can also be
# triggered manually for testing.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.9.0). Leave empty for build-only (no upload)."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: contender-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: contender-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: contender-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: contender-darwin-amd64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Apple M-series SDK setup
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=$(xcrun -sdk macosx --show-sdk-platform-version)" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz contender
          cd ../../..

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  upload:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.tag.outputs.TAG }}"
          for dir in artifacts/contender-*; do
            file=$(ls "$dir"/*.tar.gz)
            echo "Uploading $file to release $tag"
            gh release upload "$tag" "$file" --clobber
          done
