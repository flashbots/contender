name: Container Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'contender_cli-v**'

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: flashbots/contender

jobs:
  release:
    name: Publish Docker Image
    strategy:
      matrix:
        config:
          - platform: linux/amd64
            runner: warp-ubuntu-latest-x64-16x
          - platform: linux/arm64
            runner: warp-ubuntu-latest-arm64-16x
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set env
        run: |
          platform=${{ matrix.config.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          # Extract version from tag (e.g. "contender_cli-v0.10.1" -> "v0.10.1")
          ver="${GITHUB_REF#refs/*/}"
          ver="${ver#contender_cli-}"
          # Ensure it starts with 'v'
          if [[ "$ver" != v* ]]; then
            ver="v$ver"
          fi
          echo "RELEASE_VERSION=$ver" >> $GITHUB_ENV

      - name: Print version
        run: |
          echo $RELEASE_VERSION
          echo ${{ env.RELEASE_VERSION }}

      - name: Extract metadata (tags, labels) for Docker images
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.FLASHBOTS_DOCKERHUB_USERNAME }}
          password: ${{ secrets.FLASHBOTS_DOCKERHUB_TOKEN }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
          platforms: ${{ matrix.config.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - release
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.FLASHBOTS_DOCKERHUB_USERNAME }}
          password: ${{ secrets.FLASHBOTS_DOCKERHUB_TOKEN }}

      - name: Check if prerelease
        id: check
        run: |
          # Extract version from tag (e.g. "contender_cli-v0.10.1" -> "v0.10.1")
          ver="${{ github.ref_name }}"
          ver="${ver#contender_cli-}"
          if [[ "$ver" != v* ]]; then
            ver="v$ver"
          fi
          echo "version=$ver" >> $GITHUB_OUTPUT
          # Strip leading 'v' for bare version (e.g. "0.10.1")
          echo "bare_version=${ver#v}" >> $GITHUB_OUTPUT
          dash_count=$(echo "${{ github.ref_name }}" | tr -cd '-' | wc -c)
          if [ "$dash_count" -ge 2 ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha
            type=raw,value=${{ steps.check.outputs.bare_version }}
            type=raw,value=${{ steps.check.outputs.version }}
            type=raw,value=latest,enable=${{ steps.check.outputs.is_prerelease != 'true' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.check.outputs.bare_version }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Push to GHCR
        run: |
          regctl image copy \
            ${{ env.REGISTRY_IMAGE }}:${{ steps.check.outputs.bare_version }} \
            ghcr.io/${{ github.repository }}:${{ steps.check.outputs.bare_version }}

      - name: Push latest tag to GHCR
        if: ${{ steps.check.outputs.is_prerelease != 'true' }}
        run: |
          regctl image copy \
            ${{ env.REGISTRY_IMAGE }}:latest \
            ghcr.io/${{ github.repository }}:latest

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.check.outputs.bare_version }}
