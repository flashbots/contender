# SimpleStablecoin scenario: ERC20 stablecoin with mint/burn mechanics
# Tests mint (payable), burn, transfer, and flashMintBurn patterns

[[create]]
name = "SimpleStablecoin"
bytecode = ""


# Setup: Admin mints stablecoins by sending 10 ETH (gets 10,000 tokens)
[[setup]]
kind = "admin_mint"
to = "{SimpleStablecoin}"
signature = "mint()"
args = []
value = "10 eth"

# Setup: Each spammer account mints stablecoins by sending 1 ETH (gets 1,000 tokens each)
[[setup]]
kind = "spammer_mint"
to = "{SimpleStablecoin}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint()"
args = []
value = "1 eth"


# Spam 1: Mint stablecoins (payable) - fuzz ETH value from 0.001 to 0.01
[[spam]]
[spam.tx]
kind = "stablecoin_mint"
to = "{SimpleStablecoin}"
from_pool = "spammer"
signature = "mint()"
args = []
value = "0.005 eth"
fuzz = [{ param = "value", min = "1000000000000000", max = "10000000000000000" }]

# Spam 2: Burn stablecoins - fuzz amount from 1e15 to 1e16
# gas_limit set to handle potential reverts (insufficient balance)
[[spam]]
[spam.tx]
kind = "stablecoin_burn"
to = "{SimpleStablecoin}"
from_pool = "spammer"
signature = "function burn(uint256 amount)"
args = ["5000000000000000"]
gas_limit = 100000
fuzz = [{ param = "amount", min = "1000000000000000", max = "10000000000000000" }]

# Spam 3: ERC20 transfer - fuzz amount, send to self ({_sender})
[[spam]]
[spam.tx]
kind = "stablecoin_transfer"
to = "{SimpleStablecoin}"
from_pool = "spammer"
signature = "function transfer(address to, uint256 amount) returns (bool)"
args = ["{_sender}", "500000000000000000"]
fuzz = [{ param = "amount", min = "100000000000000000", max = "1000000000000000000" }]

# Spam 4: Flash mint+burn - heavy storage ops, no ETH needed
# Fuzz amount from 1e18 to 1e21 (two balance updates, two supply updates, 4 events)
[[spam]]
[spam.tx]
kind = "stablecoin_flash_mint_burn"
to = "{SimpleStablecoin}"
from_pool = "spammer"
signature = "function flashMintBurn(uint256 amount)"
args = ["1000000000000000000000"]
fuzz = [{ param = "amount", min = "1000000000000000000", max = "1000000000000000000000" }]
