# ============================================================
# Dutch Auction - Decreasing Price Auction Stress Test
# ============================================================
# Source: /tmp/auction.sol (Solidity 0.8.26, optimized with 200 runs)
# Gas profile: ~60-80k per bid (timestamp read, price calc with division,
#              counter increments, ETH refunds via low-level call)
# ============================================================

[env]
# 1 ETH start price
startPrice = "1000000000000000000"
# 0.1 ETH end price
endPrice = "100000000000000000"
# 1 hour duration
duration = "3600"

# Deploy DutchAuction with constructor(startPrice, endPrice, duration)
[[create]]
name = "DutchAuction"
signature = "(uint256 startPrice_, uint256 endPrice_, uint256 duration_)"
args = ["{startPrice}", "{endPrice}", "{duration}"]
bytecode = ""

# Spam: bid on the auction with fuzzed ETH value
# Value is fuzzed between 0.1 ETH and 1 ETH to ensure bids succeed
# even as the price decreases over the auction duration.
# Excess ETH is refunded by the contract, exercising the refund gas pattern.
[[spam]]
[spam.tx]
kind = "bid"
to = "{DutchAuction}"
from_pool = "bidders"
signature = "function bid() external payable"
args = []
value = "1000000000000000000"
gas_limit = 150000
fuzz = [{ value = true, min = "100000000000000000", max = "1000000000000000000" }]
