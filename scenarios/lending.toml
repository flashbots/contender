# Simple Lending Protocol spammer scenario
#
# Deploys two ERC20 tokens (CollateralToken & BorrowToken) and a SimpleLending pool.
# Spammers deposit collateral, borrow against it, and repay loans.
# This creates realistic DeFi gas patterns: multiple storage reads/writes, balance checks,
# collateral ratio calculations, and token transfers.
#
# Source: /tmp/lending.sol (Solidity 0.8.26, optimized 200 runs)

[env]
initialSupply = "1000000000000000000000000000"

### Deploy contracts ###########################################################

[[create]]
name = "CollateralToken"
# LendingToken("CollateralToken", initialSupply)
bytecode = ""
signature = "(string memory name_, uint256 initialSupply)"
args = ["CollateralToken", "{initialSupply}"]

[[create]]
name = "BorrowToken"
# LendingToken("BorrowToken", initialSupply)
bytecode = ""
signature = "(string memory name_, uint256 initialSupply)"
args = ["BorrowToken", "{initialSupply}"]

[[create]]
name = "SimpleLending"
# SimpleLending(collateralToken, borrowToken)
bytecode = ""
signature = "(address collateralToken_, address borrowToken_)"
args = ["{CollateralToken}", "{BorrowToken}"]

### Setup: Admin funds the lending pool ########################################

# Mint extra CollateralTokens for the admin (used to fund spammers)
[[setup]]
kind = "admin_mint_collateral"
to = "{CollateralToken}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "500000000000000000000000000"]

# Mint extra BorrowTokens for the admin
[[setup]]
kind = "admin_mint_borrow"
to = "{BorrowToken}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "500000000000000000000000000"]

# Transfer BorrowTokens to lending pool so borrowers can draw from it
[[setup]]
kind = "admin_fund_lending_pool"
to = "{BorrowToken}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{SimpleLending}", "200000000000000000000000000"]

### Setup: Prepare each spammer account ########################################

# Mint CollateralTokens for each spammer
[[setup]]
kind = "mint_collateral_for_spammer"
to = "{CollateralToken}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "10000000000000000000000"]
from_pool = "spammer"
for_all_accounts = true

# Approve lending contract to spend spammer's CollateralTokens
[[setup]]
kind = "approve_collateral_for_spammer"
to = "{CollateralToken}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = ["{SimpleLending}", "115792089237316195423570985008687907853269984665640564039457584007913129639935"]
from_pool = "spammer"
for_all_accounts = true

# Approve lending contract to spend spammer's BorrowTokens (for repay)
[[setup]]
kind = "approve_borrow_for_spammer"
to = "{BorrowToken}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = ["{SimpleLending}", "115792089237316195423570985008687907853269984665640564039457584007913129639935"]
from_pool = "spammer"
for_all_accounts = true

# Deposit initial collateral for each spammer
[[setup]]
kind = "deposit_initial_collateral"
to = "{SimpleLending}"
signature = "depositCollateral(uint256 amount)"
args = ["5000000000000000000000"]
from_pool = "spammer"
for_all_accounts = true
gas_limit = 200000

### Spam: Lending operations ###################################################

# Spam pattern 1: Deposit more collateral (fuzz amount 1e15 to 1e17)
[[spam]]
[spam.tx]
kind = "deposit_collateral"
to = "{SimpleLending}"
from_pool = "spammer"
signature = "depositCollateral(uint256 amount)"
args = ["50000000000000000"]
fuzz = [
    { param = "amount", min = "1000000000000000", max = "100000000000000000" },
]

# Spam pattern 2: Borrow against collateral (fuzz amount 1e14 to 1e16)
# May revert if undercollateralized, so gas_limit is set to skip estimation
[[spam]]
[spam.tx]
kind = "borrow"
to = "{SimpleLending}"
from_pool = "spammer"
signature = "borrow(uint256 amount)"
args = ["5000000000000000"]
gas_limit = 300000
fuzz = [
    { param = "amount", min = "100000000000000", max = "10000000000000000" },
]

# Spam pattern 3: Repay borrowed tokens (fuzz amount 1e13 to 1e15)
# May revert if no outstanding debt, so gas_limit is set to skip estimation
[[spam]]
[spam.tx]
kind = "repay"
to = "{SimpleLending}"
from_pool = "spammer"
signature = "repay(uint256 amount)"
args = ["500000000000000"]
gas_limit = 300000
fuzz = [
    { param = "amount", min = "10000000000000", max = "1000000000000000" },
]
