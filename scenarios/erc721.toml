to = "{SimpleERC721}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to)"
args = ["{_sender}"]

# Spam 1: Continuous minting of new tokens (always succeeds)
# Each tx mints a new NFT to the sender, creating fresh state writes
[[spam]]
[spam.tx]
kind = "nft_mint"
to = "{SimpleERC721}"
signature = "mint(address to)"
args = ["{_sender}"]

# Spam 2: Self-transfers of tokens (sender transfers to self)
# Uses fuzzed tokenId; some may revert if sender doesn't own that token,
# which is realistic for benchmarking revert-handling throughput
[[spam]]
[spam.tx]
kind = "nft_transfer"
to = "{SimpleERC721}"
signature = "transferFrom(address from, address to, uint256 tokenId)"
args = ["{_sender}", "{_sender}", "1"]
fuzz = [{ param = "tokenId", min = "1", max = "1000" }]
