# Setup: mint 5 tokens to every spammer account so they own tokens for transfers
# Token IDs start at 21 and continue sequentially across all spammer accounts
[[setup]]
kind = "spammer_mint_1"
to = "{SimpleERC721}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to)"
args = ["{_sender}"]

[[setup]]
kind = "spammer_mint_2"
to = "{SimpleERC721}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to)"
args = ["{_sender}"]

[[setup]]
kind = "spammer_mint_3"
to = "{SimpleERC721}"
from_pool = "spammer"
