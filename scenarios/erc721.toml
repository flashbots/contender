# ============================================================
# ERC721 NFT - Minting and Transfer Stress Test
# ============================================================
# Source: custom minimal ERC721 (/tmp/erc721.sol)
# Gas profile: ~51k mint, ~48k transferFrom
# ============================================================
#
# This scenario deploys a minimal ERC721 contract and exercises two patterns:
# 1. Continuous minting (always succeeds, creates new state)
# 2. Self-transfers of previously minted tokens (exercises ownership checks)
#
# Setup mints tokens to all spammer accounts via for_all_accounts so each
# spammer owns tokens they can transfer. Transfer spam uses self-transfers
# ({_sender} -> {_sender}) so the sender is always the owner.

[env]
# Number of tokens minted per spammer in setup (5 rounds x for_all_accounts)
tokens_per_spammer = "5"

[[create]]
name = "SimpleERC721"
bytecode = ""

# Setup: admin mints 20 tokens to seed initial supply (token IDs 1-20)
[[setup]]
kind = "admin_mint_01"
to = "{SimpleERC721}"
from_pool = "admin"
signature = "mint(address to)"
args = ["{_sender}"]

[[setup]]
kind = "admin_mint_02"
to = "{SimpleERC721}"
from_pool = "admin"
signature = "mint(address to)"
args = ["{_sender}"]

