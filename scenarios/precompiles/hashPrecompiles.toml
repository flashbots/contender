# Focused precompile stress test: SHA256, RIPEMD160, identity, and batch calls.
# Contract: PrecompileHammer (Solidity 0.8.26, optimized)

[[create]]
name = "PrecompileHammer"
bytecode = ""

# SHA256 precompile (0x02) stress
[[spam]]
from_pool = "sha256_pool"
[spam.tx]
to = "{PrecompileHammer}"
signature = "hashSHA256(uint256 iterations, bytes memory data)"
args = ["200", "0xdeadbeef"]
fuzz = [
    { param = "iterations", min = "100", max = "500" },
]

# RIPEMD160 precompile (0x03) stress
[[spam]]
from_pool = "ripemd160_pool"
[spam.tx]
to = "{PrecompileHammer}"
signature = "hashRIPEMD160(uint256 iterations2, bytes memory data2)"
args = ["200", "0xdeadbeef"]
fuzz = [
    { param = "iterations2", min = "100", max = "500" },
]

# Identity precompile (0x04) stress — cheaper per call, so higher iteration range
[[spam]]
from_pool = "identity_pool"
[spam.tx]
to = "{PrecompileHammer}"
signature = "callIdentity(uint256 iterations3, bytes memory data3)"
args = ["1000", "0xdeadbeef"]
fuzz = [
    { param = "iterations3", min = "500", max = "2000" },
]

# Batch all three precompiles per iteration
[[spam]]
from_pool = "batch_pool"
[spam.tx]
to = "{PrecompileHammer}"
signature = "batchPrecompiles(uint256 iterations4, bytes memory data4)"
args = ["100", "0xdeadbeef"]
fuzz = [
    { param = "iterations4", min = "50", max = "200" },
]
