[[setup]]
kind = "create_proposal_9"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 9: Update token emission schedule"]


## Spam: create new proposals (ongoing proposal creation load)
[[spam]]
[spam.tx]
kind = "create_proposal"
to = "{SimpleGovernance}"
from_pool = "proposers"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Spam proposal: stress test governance"]

## Spam: vote on existing proposals (IDs 0-9)
# Votes may revert if the sender has already voted on that proposal
[[spam]]
[spam.tx]
kind = "cast_vote"
to = "{SimpleGovernance}"
from_pool = "voters"
signature = "function vote(uint256 proposalId, bool support) external"
args = ["0", "true"]
gas_limit = 120000
fuzz = [
    { param = "proposalId", min = "0", max = "9" },
]
