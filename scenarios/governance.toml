# SimpleGovernance scenario
# Simulates on-chain governance voting with realistic gas patterns:
# storage writes for vote tracking, event emission, and require checks.
# source: /tmp/governance.sol (Solidity 0.8.26, optimized with 200 runs)

## Deploy the governance contract
[[create]]
name = "SimpleGovernance"
bytecode = ""


## Setup: create 10 proposals (IDs 0-9) from admin
[[setup]]
kind = "create_proposal_0"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 0: Increase staking rewards"]

[[setup]]
kind = "create_proposal_1"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 1: Reduce validator bond"]

[[setup]]
kind = "create_proposal_2"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 2: Upgrade protocol to v2"]

[[setup]]
kind = "create_proposal_3"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 3: Fund ecosystem grants"]

[[setup]]
kind = "create_proposal_4"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 4: Adjust fee parameters"]

[[setup]]
kind = "create_proposal_5"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 5: Add new oracle provider"]

[[setup]]
kind = "create_proposal_6"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 6: Modify governance quorum"]

[[setup]]
kind = "create_proposal_7"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
args = ["Proposal 7: Treasury diversification"]

[[setup]]
kind = "create_proposal_8"
to = "{SimpleGovernance}"
signature = "function createProposal(string memory description) external returns (uint256)"
