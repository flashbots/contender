# Shared Economy Mega-Scenario
#
# Simulates a realistic block builder contention environment where multiple
# actor types interact with the SAME shared contracts. This creates the kind
# of cross-protocol storage slot contention seen in real Ethereum blocks:
#
#   - Traders swap on the same AMM (reserve contention)
#   - LPs add/remove liquidity (reserve + share contention)
#   - Borrowers deposit/borrow from a lending pool (collateral + debt contention)
#   - Oracle nodes push price updates (triggers downstream contention)
#   - Liquidators race to liquidate undercollateralized positions (priority contention)
#   - MEV searchers atomically update oracle + arb AMM (cross-protocol bundles)
#
# Contention Map:
#   EconAMM.reserveA/B  <-- traders, LPs, arbitrageurs
#   EconLending.collateral/debt  <-- borrowers, liquidators
#   EconOracle.latestPrice  <-- oracle_nodes, searchers
#   TokenA/B.balanceOf  <-- ALL actors
#
# Contracts:
#   - EconToken: Minimal ERC20 with public mint (deployed twice as TokenA/TokenB)
#   - EconOracle: Simple price oracle anyone can update
#   - EconAMM: Constant product AMM (x*y=k) with 0.3% fee
#   - EconLending: Lending pool with oracle-based liquidations (150% CR, 120% liq threshold)
#   - EconSearcher: MEV bot for atomic oracle+arb and liquidation+swap bundles
#
# source: /tmp/economy.sol
# compiled with: solc --bin --optimize --optimize-runs 200 /tmp/economy.sol

[env]
# Token setup
traderMintAmount = "50000000000000000000000"
borrowerMintAmount = "100000000000000000000000"
lpMintAmount = "100000000000000000000000"
liquidatorMintAmount = "50000000000000000000000"
searcherMintAmount = "200000000000000000000000"
# AMM liquidity
liquidityAmount = "500000000000000000000000"
# Lending pool seed
lendingPoolSeed = "200000000000000000000000"
# Borrower initial collateral & borrow
borrowerCollateral = "5000000000000000000000"
borrowerBorrowAmount = "1000000000000000000000"
# Oracle initial price (1.0 in 18 decimals)
initialPrice = "1000000000000000000"


### Deploy contracts ###########################################################

[[create]]
name = "TokenA"
signature = "(string memory name_, string memory symbol_)"
args = ["EconTokenA", "ECONA"]
bytecode = ""

[[create]]
name = "TokenB"
signature = "(string memory name_, string memory symbol_)"
args = ["EconTokenB", "ECONB"]
bytecode = ""

[[create]]
name = "EconOracle"
signature = "()"
args = []
bytecode = ""

[[create]]
name = "EconAMM"
signature = "(address tokenA_, address tokenB_)"
args = ["{TokenA}", "{TokenB}"]
bytecode = ""

[[create]]
name = "EconLending"
signature = "(address tokenA_, address tokenB_, address oracle_)"
args = ["{TokenA}", "{TokenB}", "{EconOracle}"]
bytecode = ""

[[create]]
name = "EconSearcher"
signature = "()"
args = []
bytecode = ""


### Setup: Seed the shared economy #############################################

## 1. Set initial oracle price

[[setup]]
kind = "set_initial_price"
to = "{EconOracle}"
signature = "updatePrice(int256 price)"
args = ["{initialPrice}"]

## 2. Admin: mint tokens, approve AMM, add liquidity

[[setup]]
kind = "admin_mint_tokenA"
to = "{TokenA}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "1000000000000000000000000"]

[[setup]]
kind = "admin_mint_tokenB"
to = "{TokenB}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "1000000000000000000000000"]

[[setup]]
kind = "admin_approve_amm_tokenA"
to = "{TokenA}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{EconAMM}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

[[setup]]
kind = "admin_approve_amm_tokenB"
to = "{TokenB}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{EconAMM}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

[[setup]]
kind = "admin_add_liquidity"
to = "{EconAMM}"
signature = "addLiquidity(uint256 amountA, uint256 amountB) returns (uint256)"
args = ["{liquidityAmount}", "{liquidityAmount}"]
gas_limit = 400000

## 3. Fund lending pool with TokenB for borrowing

[[setup]]
kind = "admin_fund_lending_tokenB"
to = "{TokenB}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{EconLending}", "{lendingPoolSeed}"]

## 4. Fund EconSearcher with both tokens

[[setup]]
kind = "fund_searcher_tokenA"
to = "{TokenA}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{EconSearcher}", "{searcherMintAmount}"]

[[setup]]
kind = "fund_searcher_tokenB"
to = "{TokenB}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{EconSearcher}", "{searcherMintAmount}"]

## 5. Trader accounts: mint both tokens, approve AMM

[[setup]]
kind = "mint_tokenA_for_traders"
to = "{TokenA}"
from_pool = "traders"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{traderMintAmount}"]

[[setup]]
