### Spam: The Economy in Action ################################################
#
# ~10 spam patterns creating a rich contention graph:
#   1. trader_swap_a_to_b     — traders swap TokenA->TokenB on AMM
#   2. trader_swap_b_to_a     — traders swap TokenB->TokenA on AMM
#   3. borrower_deposit       — borrowers deposit more collateral
#   4. borrower_borrow        — borrowers borrow more TokenB
#   5. borrower_repay         — borrowers repay debt
#   6. lp_add_liquidity       — LPs add liquidity to AMM
#   7. lp_remove_liquidity    — LPs remove liquidity from AMM
#   8. oracle_update          — oracle nodes push price updates
#   9. liquidation_attempt    — liquidators race to liquidate
#  10. searcher_oracle_arb    — MEV bundle: oracle update + AMM arb + tip

# --- Low-priority: Normal traders swap on AMM (high contention on reserves) ---

# Pattern 1: Swap TokenA for TokenB
[[spam]]
[spam.tx]
kind = "trader_swap_a_to_b"
to = "{EconAMM}"
from_pool = "traders"
signature = "swap(address tokenIn, uint256 amountIn, uint256 minOut) returns (uint256)"
args = ["{TokenA}", "1000000000000000000", "0"]
fuzz = [{ param = "amountIn", min = "100000000000000000", max = "5000000000000000000" }]

# Pattern 2: Swap TokenB for TokenA
[[spam]]
[spam.tx]
kind = "trader_swap_b_to_a"
to = "{EconAMM}"
from_pool = "traders"
signature = "swap(address tokenIn, uint256 amountIn, uint256 minOut) returns (uint256)"
args = ["{TokenB}", "1000000000000000000", "0"]
fuzz = [{ param = "amountIn", min = "100000000000000000", max = "5000000000000000000" }]

# --- Low-priority: Borrowers interact with lending pool ---

# Pattern 3: Deposit more collateral
[[spam]]
[spam.tx]
kind = "borrower_deposit"
to = "{EconLending}"
from_pool = "borrowers"
signature = "depositCollateral(uint256 amount)"
args = ["500000000000000000"]
fuzz = [{ param = "amount", min = "100000000000000000", max = "1000000000000000000" }]

# Pattern 4: Borrow more TokenB (may revert if undercollateralized)
[[spam]]
[spam.tx]
kind = "borrower_borrow"
to = "{EconLending}"
from_pool = "borrowers"
signature = "borrow(uint256 amount)"
args = ["100000000000000000"]
gas_limit = 300000
fuzz = [{ param = "amount", min = "50000000000000000", max = "500000000000000000" }]

# Pattern 5: Repay borrowed TokenB (may revert if no debt)
[[spam]]
[spam.tx]
kind = "borrower_repay"
to = "{EconLending}"
from_pool = "borrowers"
signature = "repay(uint256 amount)"
args = ["100000000000000000"]
gas_limit = 300000
fuzz = [{ param = "amount", min = "10000000000000000", max = "200000000000000000" }]

# --- Low-priority: LPs manage liquidity ---

# Pattern 6: Add liquidity to AMM (contention on reserves + LP shares)
[[spam]]
[spam.tx]
kind = "lp_add_liquidity"
to = "{EconAMM}"
from_pool = "lps"
signature = "addLiquidity(uint256 amountA, uint256 amountB) returns (uint256)"
args = ["1000000000000000000", "1000000000000000000"]
gas_limit = 300000
fuzz = [
    { param = "amountA", min = "100000000000000000", max = "5000000000000000000" },
    { param = "amountB", min = "100000000000000000", max = "5000000000000000000" },
]

# Pattern 7: Remove liquidity from AMM (may revert if no shares)
[[spam]]
[spam.tx]
kind = "lp_remove_liquidity"
to = "{EconAMM}"
from_pool = "lps"
signature = "removeLiquidity(uint256 sharesToBurn)"
args = ["100000000000000000"]
gas_limit = 300000
fuzz = [{ param = "sharesToBurn", min = "10000000000000000", max = "500000000000000000" }]

# --- Medium-priority: Oracle nodes push price updates ---

# Pattern 8: Oracle price updates (triggers downstream contention)
# Price oscillates around 1.0 (0.8 to 1.2 in 18-decimal)
[[spam]]
[spam.tx]
kind = "oracle_update"
to = "{EconOracle}"
from_pool = "oracle_nodes"
signature = "updatePrice(int256 price)"
args = ["1000000000000000000"]
fuzz = [{ param = "price", min = "800000000000000000", max = "1200000000000000000" }]

# --- High-priority: Liquidators race to liquidate ---

# Pattern 9: Liquidation attempts (will often revert — that's realistic)
# When oracle price drops, some borrowers become undercollateralized
# Multiple liquidators competing = high contention on same user's position
[[spam]]
[spam.tx]
kind = "liquidation_attempt"
to = "{EconLending}"
from_pool = "liquidators"
signature = "liquidate(address user)"
args = ["{_sender}"]
gas_limit = 400000

# --- MEV Bundles: Atomic multi-step extraction ---

# Pattern 10: Oracle update + AMM arbitrage bundle
# Searcher atomically updates oracle then arbs the AMM, tipping the validator
[[spam]]

[[spam.bundle.tx]]
kind = "searcher_oracle_arb"
to = "{EconSearcher}"
from_pool = "searchers"
signature = "oracleUpdateAndArb(address oracle, int256 newPrice, address amm, address tokenIn, uint256 amountIn)"
args = ["{EconOracle}", "900000000000000000", "{EconAMM}", "{TokenA}", "10000000000000000000"]
gas_limit = 500000
fuzz = [
    { param = "newPrice", min = "850000000000000000", max = "1150000000000000000" },
    { param = "amountIn", min = "1000000000000000000", max = "50000000000000000000" },
]

[[spam.bundle.tx]]
kind = "searcher_tip"
to = "{EconSearcher}"
from_pool = "searchers"
signature = "tipValidator()"
value = "0.01 eth"
gas_limit = 50000
