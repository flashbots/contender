# MEV Sandwich Attack scenario
#
# Simulates MEV sandwich attacks, which are >1 per block on mainnet.
# Pattern: frontrun tx (buy) -> victim tx (swap) -> backrun tx (sell).
# Tests bundle ordering and multi-tx atomic patterns.
#
# Contracts:
#   - SandwichToken: Minimal ERC20 with public mint
#   - SandwichPool: Simple constant product AMM (x*y=k) with 0.3% fee
#   - SandwichBot: MEV bot that frontruns and backruns victim swaps
#
# source: /tmp/sandwich.sol
# compiled with: solc --bin --optimize --optimize-runs 200 /tmp/sandwich.sol

[env]
initialSupply = "1000000000000000000000000000"
liquidityAmount = "500000000000000000000000"
botFunds = "100000000000000000000000"
spammerMintAmount = "50000000000000000000000"


### Deploy contracts ###########################################################

[[create]]
name = "TokenA"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

[[create]]
name = "TokenB"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

[[create]]
name = "SandwichPool"
signature = "(address tokenA_, address tokenB_)"
args = ["{TokenA}", "{TokenB}"]
bytecode = ""

[[create]]
name = "SandwichBot"
signature = "()"
args = []
bytecode = ""


### Setup contracts ############################################################

## Admin approves pool to spend tokens for initial liquidity

[[setup]]
kind = "admin_approve_pool_tokenA"
to = "{TokenA}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SandwichPool}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

[[setup]]
kind = "admin_approve_pool_tokenB"
to = "{TokenB}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SandwichPool}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Add initial liquidity (large amounts for deep pool)

[[setup]]
kind = "admin_add_liquidity"
to = "{SandwichPool}"
signature = "addLiquidity(uint256 amountA, uint256 amountB)"
args = ["{liquidityAmount}", "{liquidityAmount}"]
gas_limit = 300000

## Fund SandwichBot with both tokens

[[setup]]
kind = "fund_bot_tokenA"
to = "{TokenA}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{SandwichBot}", "{botFunds}"]

[[setup]]
kind = "fund_bot_tokenB"
to = "{TokenB}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{SandwichBot}", "{botFunds}"]

## Mint tokens to all victim spammer accounts and approve pool

[[setup]]
kind = "mint_tokenA_to_victims"
to = "{TokenA}"
from_pool = "victims"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerMintAmount}"]

[[setup]]
kind = "victims_approve_pool_tokenA"
to = "{TokenA}"
from_pool = "victims"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SandwichPool}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

[[setup]]
kind = "mint_tokenB_to_victims"
to = "{TokenB}"
from_pool = "victims"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerMintAmount}"]

[[setup]]
kind = "victims_approve_pool_tokenB"
to = "{TokenB}"
from_pool = "victims"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SandwichPool}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Mint tokens to searcher accounts and approve pool (for direct swaps if needed)

[[setup]]
kind = "mint_tokenA_to_searchers"
to = "{TokenA}"
from_pool = "searchers"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerMintAmount}"]

[[setup]]
kind = "mint_tokenB_to_searchers"
to = "{TokenB}"
from_pool = "searchers"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerMintAmount}"]


### Spam patterns ##############################################################

# Pattern 1: Normal victim swaps (standalone, not in a bundle)
# These represent regular user swaps that MEV bots would target
[[spam]]
[spam.tx]
kind = "victim_swap"
to = "{SandwichPool}"
from_pool = "victims"
signature = "swap(address tokenIn, uint256 amountIn, uint256 minAmountOut) returns (uint256)"
args = ["{TokenA}", "1000000000000000000", "0"]
fuzz = [{ param = "amountIn", min = "100000000000000000", max = "5000000000000000000" }]

# Pattern 2: MEV Sandwich bundle (frontrun + victim + backrun)
# Atomic bundle ensures ordering: buy before victim, sell after victim
[[spam]]

[[spam.bundle.tx]]
kind = "frontrun"
to = "{SandwichBot}"
from_pool = "searchers"
signature = "frontrun(address pool, address tokenIn, uint256 amountIn)"
args = ["{SandwichPool}", "{TokenA}", "2000000000000000000"]
gas_limit = 200000
fuzz = [{ param = "amountIn", min = "500000000000000000", max = "5000000000000000000" }]

[[spam.bundle.tx]]
kind = "victim_in_bundle"
to = "{SandwichPool}"
from_pool = "victims"
signature = "swap(address tokenIn, uint256 amountIn, uint256 minAmountOut) returns (uint256)"
args = ["{TokenA}", "1000000000000000000", "0"]
gas_limit = 200000

[[spam.bundle.tx]]
kind = "backrun"
to = "{SandwichBot}"
from_pool = "searchers"
signature = "backrun(address pool, address tokenIn, uint256 amountIn)"
args = ["{SandwichPool}", "{TokenB}", "2000000000000000000"]
gas_limit = 200000
fuzz = [{ param = "amountIn", min = "500000000000000000", max = "5000000000000000000" }]
