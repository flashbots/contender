# ============================================================
# Merkle Tree Airdrop Claim - Keccak256 Compute Stress Test
# ============================================================
# Source: /tmp/merkle_airdrop.sol (AirdropToken + MockMerkleAirdrop)
# Gas profile: keccak256-heavy proof verification loop,
#              bitmap storage writes, ERC20 token transfers
# ============================================================

[env]
initialSupply = "1000000000000000000000000000"
airdropFundAmount = "500000000000000000000000000"

### Deploy AirdropToken with initial supply

[[create]]
name = "AirdropToken"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

### Deploy MockMerkleAirdrop with (token address, proofDepth)
### proofDepth is stored but the actual numHashes is passed per-call for fuzzing

[[create]]
name = "MockMerkleAirdrop"
signature = "(address token_, uint256 proofDepth_)"
args = ["{AirdropToken}", "20"]
bytecode = ""

### Setup: mint tokens to the airdrop contract to fund claims

[[setup]]
kind = "fund_airdrop"
to = "{AirdropToken}"
signature = "mint(address to, uint256 amount)"
args = ["{MockMerkleAirdrop}", "{airdropFundAmount}"]

### Spam: claim airdrop with fuzzed index, amount, and numHashes
### - index is fuzzed across a wide range so claimed bitmap rarely collides
### - amount is fuzzed from 0.1 to 10 tokens
### - numHashes is fuzzed from 10 to 30 (simulates trees of 1K to 1B leaves)
### - May revert if the same index is claimed twice (bitmap collision)

[[spam]]
[spam.tx]
kind = "claim"
to = "{MockMerkleAirdrop}"
from_pool = "spammer"
signature = "claim(uint256 index, uint256 amount, uint256 numHashes)"
args = ["1", "1000000000000000000", "20"]
gas_limit = 300000
fuzz = [
    { param = "index", min = "0", max = "1000000" },
    { param = "amount", min = "100000000000000000", max = "10000000000000000000" },
    { param = "numHashes", min = "10", max = "30" },
]
