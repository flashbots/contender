# Curve-style StableSwap AMM scenario
#
# Deploys a Curve-inspired 2-token stable pool with the StableSwap invariant.
# Unlike constant-product AMMs (x*y=k), StableSwap uses an invariant that blends
# constant-sum and constant-product behavior, controlled by the amplification
# coefficient A. The key gas differentiator is Newton's method iteration (up to
# 255 iterations) in both getD() and getY(), making swaps ~2-3x more expensive
# than constant-product AMMs. This represents ~1.5% of mainnet gas.
#
# Contracts:
#   - StableToken: Minimal ERC20 with public mint
#   - StableSwap: Curve-style 2-token pool with Newton's method invariant
#
# source: /tmp/stableswap.sol
# compiled with: solc --bin --optimize --optimize-runs 200 /tmp/stableswap.sol

[env]
initialSupply = "1000000000000000000000000000"
amplification = "100"
liquidityAmount = "1000000000000000000000000"
spammerFunds = "100000000000000000000000"


### Deploy contracts ###########################################################

[[create]]
name = "TokenA"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
# StableToken bytecode
bytecode = ""

[[create]]
name = "TokenB"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
# StableToken bytecode (same contract, different deployment)
bytecode = ""

[[create]]
name = "StableSwap"
signature = "(address tokenA_, address tokenB_, uint256 amplification_)"
args = ["{TokenA}", "{TokenB}", "{amplification}"]
# StableSwap bytecode
bytecode = ""


### Setup contracts #############################################################

## Admin approves StableSwap to spend TokenA

[[setup]]
kind = "admin_approve_stableswap_tokenA"
to = "{TokenA}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{StableSwap}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Admin approves StableSwap to spend TokenB

[[setup]]
kind = "admin_approve_stableswap_tokenB"
to = "{TokenB}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{StableSwap}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Admin adds large initial liquidity (equal amounts — stablecoin pool)

[[setup]]
kind = "admin_add_initial_liquidity"
to = "{StableSwap}"
signature = "addLiquidity(uint256 amountA, uint256 amountB) returns (uint256 lpAmount)"
args = ["{liquidityAmount}", "{liquidityAmount}"]
gas_limit = 500000

## Mint TokenA to all spammer accounts

[[setup]]
kind = "mint_tokenA_for_spammer"
to = "{TokenA}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerFunds}"]

## Mint TokenB to all spammer accounts

[[setup]]
kind = "mint_tokenB_for_spammer"
to = "{TokenB}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerFunds}"]

## All spammers approve StableSwap for TokenA

[[setup]]
kind = "spammer_approve_stableswap_tokenA"
to = "{TokenA}"
from_pool = "spammer"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{StableSwap}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## All spammers approve StableSwap for TokenB

[[setup]]
kind = "spammer_approve_stableswap_tokenB"
to = "{TokenB}"
from_pool = "spammer"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{StableSwap}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]


### Spam patterns ##############################################################

# Swap TokenA for TokenB (index 0 -> 1)
# Newton's method in getD + getY makes this ~2-3x more gas than constant-product
# Fuzz dx from 0.01 to 10 tokens (1e16 to 1e19 wei)
[[spam]]
[spam.tx]
kind = "stableswap_swap_0_to_1"
to = "{StableSwap}"
from_pool = "spammer"
signature = "swap(uint256 i, uint256 j, uint256 dx) returns (uint256 dy)"
args = ["0", "1", "10000000000000000"]
fuzz = [{ param = "dx", min = "10000000000000000", max = "10000000000000000000" }]

# Swap TokenB for TokenA (index 1 -> 0)
# Fuzz dx from 0.01 to 10 tokens (1e16 to 1e19 wei)
[[spam]]
[spam.tx]
kind = "stableswap_swap_1_to_0"
to = "{StableSwap}"
from_pool = "spammer"
signature = "swap(uint256 i, uint256 j, uint256 dx) returns (uint256 dy)"
args = ["1", "0", "10000000000000000"]
fuzz = [{ param = "dx", min = "10000000000000000", max = "10000000000000000000" }]

# Add liquidity with fuzzed amounts
# Fuzz both amounts from 0.01 to 1 token (1e16 to 1e18 wei)
[[spam]]
[spam.tx]
kind = "stableswap_add_liquidity"
to = "{StableSwap}"
from_pool = "spammer"
signature = "addLiquidity(uint256 amountA, uint256 amountB) returns (uint256 lpAmount)"
args = ["10000000000000000", "10000000000000000"]
fuzz = [
    { param = "amountA", min = "10000000000000000", max = "1000000000000000000" },
    { param = "amountB", min = "10000000000000000", max = "1000000000000000000" },
]
