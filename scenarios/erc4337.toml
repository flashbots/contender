# ============================================================
# ERC-4337 Account Abstraction - Stress Test
# ============================================================
# Source: /tmp/erc4337.sol (Solidity 0.8.26, optimized with 200 runs)
# Gas profile: two-loop validate-then-execute pattern (~2% mainnet gas),
#              nested low-level calls, signature verification,
#              nonce tracking, deposit accounting, event emissions
# Pattern: UserOpHelper constructs UserOperations and submits
#          them through SimpleEntryPoint.handleOps, which first
#          validates all ops (loop 1) then executes all (loop 2).
#          Each UserOp calls SimpleAccount.execute -> SimpleCounter.
# ============================================================

[env]
depositAmount = "10000000000000000000"
fundAmount = "5000000000000000000"
incrementCalldata = "0xd09de08a"

### Deploy contracts

# 1. Deploy SimpleEntryPoint
[[create]]
name = "SimpleEntryPoint"
bytecode = ""

# 2. Deploy SimpleCounter
[[create]]
name = "SimpleCounter"
bytecode = ""

# 3. Deploy SimpleAccount (constructor: entryPoint address, owner address)
#    Owner is set to the admin sender so signature validation passes
[[create]]
name = "SimpleAccount"
signature = "constructor(address,address)"
args = ["{SimpleEntryPoint}", "{_sender}"]
bytecode = ""

# 4. Deploy UserOpHelper (no constructor args)
[[create]]
name = "UserOpHelper"
bytecode = ""

### Setup: fund SimpleAccount's deposit on EntryPoint

[[setup]]
kind = "deposit_to_account"
to = "{SimpleEntryPoint}"
signature = "depositTo(address account)"
args = ["{SimpleAccount}"]
value = "10 eth"

### Setup: fund SimpleAccount directly with ETH (for paying missing funds)

[[setup]]
kind = "fund_account"
to = "{SimpleAccount}"
value = "5 eth"

### Spam: submit UserOperations through the helper
# Each call constructs a UserOp that calls increment() on SimpleCounter
# through the SimpleAccount, routed via the EntryPoint's two-loop handleOps.
# The helper auto-increments nonces by reading from EntryPoint.

[[spam]]
[spam.tx]
kind = "submit_userop"
to = "{UserOpHelper}"
from_pool = "admin"
signature = "submitOp(address entryPoint, address sender, address target, uint256 value, bytes calldata innerCallData, address signerOwner)"
args = ["{SimpleEntryPoint}", "{SimpleAccount}", "{SimpleCounter}", "0", "{incrementCalldata}", "{_sender}"]
gas_limit = 500000
