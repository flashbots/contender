# Simple On-Chain Order Book
#
# Deploys two ERC20 tokens (BaseToken, QuoteToken) and a SimpleOrderBook contract.
# Spammers place buy/sell orders and attempt cancellations to exercise array storage
# operations, token transfers, and matching logic with multiple storage reads/writes.
#
# source: /tmp/orderbook.sol
# compiled with: solc --bin --optimize --optimize-runs 200

### template variables
[env]
initialSupply = "1000000000000000000000000000"

### deploy BaseToken (OrderBookToken) with initialSupply
[[create]]
name = "BaseToken"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

### deploy QuoteToken (OrderBookToken) with initialSupply
[[create]]
name = "QuoteToken"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

### deploy SimpleOrderBook with both token addresses
[[create]]
name = "OrderBook"
signature = "(address baseToken_, address quoteToken_)"
args = ["{BaseToken}", "{QuoteToken}"]
bytecode = ""

## setup: mint BaseToken to all spammer accounts ##################################

[[setup]]
kind = "spammer_mint_base"
to = "{BaseToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "100000000000000000000000"]

## setup: mint QuoteToken to all spammer accounts #################################

[[setup]]
kind = "spammer_mint_quote"
to = "{QuoteToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "100000000000000000000000"]

## setup: all spammer accounts approve OrderBook for BaseToken ####################

[[setup]]
kind = "spammer_approve_base"
to = "{BaseToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{OrderBook}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## setup: all spammer accounts approve OrderBook for QuoteToken ###################

[[setup]]
kind = "spammer_approve_quote"
to = "{QuoteToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{OrderBook}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

### SPAM

## spam: place buy orders (fuzz price and amount) #################################

[[spam]]
[spam.tx]
kind = "place_buy_order"
to = "{OrderBook}"
from_pool = "spammers"
signature = "placeBuyOrder(uint256 price, uint256 amount) returns (uint256 orderId)"
args = ["1000000000000000000", "1000000000000000"]
gas_limit = 300000
fuzz = [
    { param = "price", min = "1000000000000000", max = "1000000000000000000" },
    { param = "amount", min = "1000000000000000", max = "100000000000000000" },
]

## spam: place sell orders (fuzz price and amount) ################################

[[spam]]
[spam.tx]
kind = "place_sell_order"
to = "{OrderBook}"
from_pool = "spammers"
signature = "placeSellOrder(uint256 price, uint256 amount) returns (uint256 orderId)"
args = ["1000000000000000000", "1000000000000000"]
gas_limit = 300000
fuzz = [
    { param = "price", min = "1000000000000000", max = "1000000000000000000" },
    { param = "amount", min = "1000000000000000", max = "100000000000000000" },
]

## spam: cancel orders (fuzz orderId, may revert for invalid/already-cancelled) ###

[[spam]]
[spam.tx]
kind = "cancel_order"
to = "{OrderBook}"
from_pool = "spammers"
signature = "cancelOrder(uint256 orderId)"
args = ["0"]
gas_limit = 200000
fuzz = [{ param = "orderId", min = "0", max = "1000" }]
