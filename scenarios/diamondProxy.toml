# ============================================================
# Diamond Proxy (EIP-2535) - Delegatecall Dispatch Benchmark
# ============================================================
# Tests the delegatecall dispatch pattern: every function call
# goes through a selector lookup + delegatecall in the Diamond
# fallback, adding ~2-5k gas overhead per call.
#
# Source: /tmp/diamond.sol (Diamond, CounterFacet, TokenFacet, StorageFacet)
# Compiled with: solc --bin --optimize --optimize-runs 200
# ============================================================

[env]
mintAmount = "1000000000000000000000000"

### Deploy contracts

[[create]]
name = "Diamond"
bytecode = ""

[[create]]
name = "CounterFacet"
bytecode = ""

[[create]]
name = "TokenFacet"
bytecode = ""

[[create]]
name = "StorageFacet"
bytecode = ""

### Setup: register CounterFacet selectors on Diamond

[[setup]]
kind = "register_counter_facet"
to = "{Diamond}"
signature = "addFacet(address facet, bytes4[] selectors)"
args = ["{CounterFacet}", "[0xd09de08a,0xa87d942c]"]

### Setup: register TokenFacet selectors on Diamond

[[setup]]
kind = "register_token_facet"
to = "{Diamond}"
signature = "addFacet(address facet, bytes4[] selectors)"
args = ["{TokenFacet}", "[0x40c10f19,0xa9059cbb,0x70a08231]"]

### Setup: register StorageFacet selectors on Diamond

[[setup]]
kind = "register_storage_facet"
to = "{Diamond}"
signature = "addFacet(address facet, bytes4[] selectors)"
args = ["{StorageFacet}", "[0x9718cb5a,0x36c217f8]"]

### Setup: mint initial tokens to all spammer accounts via Diamond (routed to TokenFacet)

[[setup]]
kind = "spammer_mint_tokens"
to = "{Diamond}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{mintAmount}"]

### Spam patterns (all calls go to Diamond, dispatched via delegatecall)

# 1. Increment counter — routed to CounterFacet via delegatecall
[[spam]]
[spam.tx]
kind = "increment"
to = "{Diamond}"
from_pool = "spammer"
signature = "increment()"
args = []

# 2. Transfer tokens — routed to TokenFacet via delegatecall
[[spam]]
[spam.tx]
kind = "transfer"
to = "{Diamond}"
from_pool = "spammer"
signature = "transfer(address to, uint256 amount)"
args = ["{_sender}", "1000000000000000000"]
gas_limit = 200000
fuzz = [{ param = "amount", min = "100000000000000000", max = "10000000000000000000" }]

# 3. Write many storage slots — routed to StorageFacet via delegatecall (stress test)
[[spam]]
[spam.tx]
kind = "write_many"
to = "{Diamond}"
from_pool = "spammer"
signature = "writeMany(uint256 count)"
args = ["25"]
gas_limit = 5000000
fuzz = [{ param = "count", min = "5", max = "50" }]

# 4. Mint tokens — routed to TokenFacet via delegatecall
[[spam]]
[spam.tx]
kind = "mint"
to = "{Diamond}"
from_pool = "spammer"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "500000000000000000000"]
fuzz = [{ param = "amount", min = "100000000000000000000", max = "1000000000000000000000" }]
