# Flash Loan Arbitrage scenario
#
# Deploys a flash loan provider (ERC-3156), two fixed-rate swap pools with
# different exchange rates, and an arbitrage bot that borrows via flash loan,
# swaps through both pools to capture the rate difference, and repays atomically.
#
# This creates a deep call stack (4-5 levels):
#   Spammer -> FlashBorrower.executeArbitrage -> FlashLender.flashLoan
#   -> FlashBorrower.onFlashLoan -> PoolA.swap -> PoolB.swap -> repay
#
# Contracts:
#   - FlashToken: Minimal ERC20 with public mint (deployed twice as TokenA & TokenB)
#   - FlashLender: ERC-3156 flash loan provider (0.1% fee)
#   - SimplePool: Fixed exchange rate swap pool (deployed twice with different rates)
#   - FlashBorrower: Arbitrage bot that chains borrow -> multi-DEX arb -> repay
#
# source: /tmp/flashloan.sol
# compiled with: solc --bin --optimize --optimize-runs 200 /tmp/flashloan.sol

[env]
initialSupply = "1000000000000000000000000000"
lenderFunds = "500000000000000000000000000"
poolFunds = "200000000000000000000000000"
borrowerFunds = "1000000000000000000000"

### Deploy contracts ###########################################################

[[create]]
name = "TokenA"
signature = "(string memory name_, string memory symbol_, uint256 initialSupply)"
args = ["TokenA", "TKA", "{initialSupply}"]
# FlashToken bytecode
bytecode = ""

[[create]]
name = "TokenB"
signature = "(string memory name_, string memory symbol_, uint256 initialSupply)"
args = ["TokenB", "TKB", "{initialSupply}"]
# FlashToken bytecode (same contract, different constructor args)
bytecode = ""

[[create]]
name = "FlashLender"
signature = "(address token_)"
args = ["{TokenA}"]
# FlashLender bytecode
bytecode = ""

# PoolA: 1 TokenA = 1.05 TokenB (rate 105/100)
[[create]]
name = "PoolA"
signature = "(address tokenA_, address tokenB_, uint256 rateNumerator_, uint256 rateDenominator_)"
args = ["{TokenA}", "{TokenB}", "105", "100"]
# SimplePool bytecode
bytecode = ""

# PoolB: 1 TokenB = 1.05 TokenA (rate 105/100, reverse direction)
# This means: swap TokenB->TokenA at 105/100, combined with PoolA's TokenA->TokenB at 105/100
# gives profit: 100 TokenA -> 105 TokenB -> 110.25 TokenA (net ~10% profit minus 0.1% fee)
[[create]]
name = "PoolB"
signature = "(address tokenA_, address tokenB_, uint256 rateNumerator_, uint256 rateDenominator_)"
args = ["{TokenB}", "{TokenA}", "105", "100"]
# SimplePool bytecode (same contract, different constructor args)
bytecode = ""

[[create]]
name = "FlashBorrower"
signature = "()"
args = []
# FlashBorrower bytecode
bytecode = ""


### Setup contracts #############################################################

## Admin approves FlashLender to pull TokenA (for depositTokens)
[[setup]]
kind = "admin_approve_lender"
to = "{TokenA}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{FlashLender}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Admin deposits TokenA into FlashLender pool
[[setup]]
kind = "admin_deposit_to_lender"
to = "{FlashLender}"
signature = "depositTokens(uint256 amount)"
args = ["{lenderFunds}"]

## Admin funds PoolA with TokenA
[[setup]]
kind = "admin_fund_poolA_tokenA"
to = "{TokenA}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{PoolA}", "{poolFunds}"]

## Admin funds PoolA with TokenB
[[setup]]
kind = "admin_fund_poolA_tokenB"
to = "{TokenB}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{PoolA}", "{poolFunds}"]

## Admin funds PoolB with TokenA
[[setup]]
kind = "admin_fund_poolB_tokenA"
to = "{TokenA}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{PoolB}", "{poolFunds}"]

## Admin funds PoolB with TokenB
[[setup]]
kind = "admin_fund_poolB_tokenB"
to = "{TokenB}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{PoolB}", "{poolFunds}"]

## Admin funds FlashBorrower with small amount of TokenA (to cover profit leftovers)
[[setup]]
kind = "admin_fund_borrower_tokenA"
to = "{TokenA}"
signature = "transfer(address to, uint256 amount) returns (bool)"
args = ["{FlashBorrower}", "{borrowerFunds}"]


### Spam patterns ##############################################################

# Execute flash loan arbitrage:
# FlashBorrower.executeArbitrage -> FlashLender.flashLoan -> onFlashLoan callback
# -> PoolA.swap (TokenA->TokenB) -> PoolB.swap (TokenB->TokenA) -> repay lender
# Fuzz the flash loan amount from 1e18 to 1e20
[[spam]]
[spam.tx]
kind = "flash_loan_arbitrage"
to = "{FlashBorrower}"
from_pool = "spammer"
signature = "executeArbitrage(address lender, address token, uint256 amount, address poolA, address poolB, address tokenB)"
args = ["{FlashLender}", "{TokenA}", "1000000000000000000", "{PoolA}", "{PoolB}", "{TokenB}"]
gas_limit = 500000
fuzz = [
    { param = "amount", min = "1000000000000000000", max = "100000000000000000000" },
]
