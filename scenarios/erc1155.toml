# ERC1155 Multi-Token Benchmark Scenario
# source: /tmp/erc1155.sol (self-contained MinimalERC1155, solidity 0.8.26)
# compiled: solc --bin --optimize --optimize-runs 200
#
# Gas profile (approximate):
#   - mint:                  ~51k gas (cold) / ~34k gas (warm)
#   - safeTransferFrom:     ~52k gas (warm)
#   - safeBatchTransferFrom: ~30k + ~26k per token ID

[env]
mintAmount = "1000000"

### Deploy contract

[[create]]
name = "ERC1155"
bytecode = ""

### Setup: mint initial token balances

# Mint token IDs 1-5 (1,000,000 each) to admin
[[setup]]
kind = "mint_admin_token_1"
to = "{ERC1155}"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "1", "{mintAmount}"]

[[setup]]
kind = "mint_admin_token_2"
to = "{ERC1155}"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "2", "{mintAmount}"]

[[setup]]
kind = "mint_admin_token_3"
to = "{ERC1155}"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "3", "{mintAmount}"]

[[setup]]
kind = "mint_admin_token_4"
to = "{ERC1155}"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "4", "{mintAmount}"]

[[setup]]
kind = "mint_admin_token_5"
to = "{ERC1155}"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "5", "{mintAmount}"]

# Mint token IDs 1-5 to all spammer accounts
[[setup]]
kind = "mint_spammers_token_1"
to = "{ERC1155}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "1", "{mintAmount}"]

[[setup]]
kind = "mint_spammers_token_2"
to = "{ERC1155}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "2", "{mintAmount}"]

[[setup]]
kind = "mint_spammers_token_3"
to = "{ERC1155}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "3", "{mintAmount}"]

[[setup]]
kind = "mint_spammers_token_4"
to = "{ERC1155}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 id, uint256 amount)"
