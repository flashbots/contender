to = "{ERC1155}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "5", "{mintAmount}"]

### Spam patterns

# 1. Single mint - mint new tokens with fuzzed ID and amount
[[spam]]
[spam.tx]
kind = "erc1155_mint"
to = "{ERC1155}"
from_pool = "spammers"
signature = "mint(address to, uint256 id, uint256 amount)"
args = ["{_sender}", "100", "1000"]
gas_limit = 80000
fuzz = [
    { param = "id", min = "100", max = "10000" },
    { param = "amount", min = "1", max = "100000" },
]

# 2. Single transfer - safeTransferFrom to self, fuzz amount
[[spam]]
[spam.tx]
kind = "erc1155_single_transfer"
to = "{ERC1155}"
from_pool = "spammers"
signature = "safeTransferFrom(address from, address to, uint256 id, uint256 amount, bytes data)"
args = ["{_sender}", "{_sender}", "1", "1", "0x"]
gas_limit = 80000
fuzz = [
    { param = "id", min = "1", max = "5" },
    { param = "amount", min = "1", max = "10" },
]

# 3. Batch transfer - transfer multiple token IDs at once to self
[[spam]]
[spam.tx]
kind = "erc1155_batch_transfer"
to = "{ERC1155}"
from_pool = "spammers"
signature = "safeBatchTransferFrom(address from, address to, uint256[] ids, uint256[] amounts, bytes data)"
args = ["{_sender}", "{_sender}", "[1,2,3]", "[1,1,1]", "0x"]
gas_limit = 200000
