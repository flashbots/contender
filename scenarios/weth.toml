# ============================================================
# WETH9 Wrap/Unwrap - Stress Test
# ============================================================
# Source: /tmp/weth.sol (WETH9)
# WETH is the highest-volume contract on Ethereum mainnet.
# Covers payable + msg.value pattern, basic ERC20 operations.
# ============================================================

[env]
adminDepositAmount = "100000000000000000000"
spammerDepositAmount = "1000000000000000000"

### Deploy WETH9

[[create]]
name = "WETH9"
bytecode = ""

### Setup: Admin deposits 100 ETH into WETH

[[setup]]
kind = "admin_deposit"
to = "{WETH9}"
signature = "deposit()"
args = []
value = "100 eth"

### Setup: Each spammer deposits 1 ETH into WETH

[[setup]]
kind = "spammer_deposit"
to = "{WETH9}"
from_pool = "spammer"
for_all_accounts = true
signature = "deposit()"
args = []
value = "1 eth"

### Spam patterns

# 1. Deposit (wrap ETH) — fuzz value from 0.001 to 0.01 ETH
[[spam]]
[spam.tx]
kind = "deposit"
to = "{WETH9}"
from_pool = "spammer"
signature = "deposit()"
args = []
value = "0.005 eth"
fuzz = [
    { value = true, min = "1000000000000000", max = "10000000000000000" },
]

# 2. Withdraw (unwrap WETH) — fuzz wad from 1e14 to 1e16
[[spam]]
[spam.tx]
kind = "withdraw"
to = "{WETH9}"
from_pool = "spammer"
signature = "withdraw(uint256 wad)"
args = ["5000000000000000"]
gas_limit = 200000
fuzz = [{ param = "wad", min = "100000000000000", max = "10000000000000000" }]

# 3. Transfer WETH — fuzz amount from 1e14 to 1e16
[[spam]]
[spam.tx]
kind = "transfer"
to = "{WETH9}"
from_pool = "spammer"
signature = "transfer(address dst, uint256 wad) returns (bool)"
args = ["{_sender}", "5000000000000000"]
gas_limit = 200000
fuzz = [{ param = "wad", min = "100000000000000", max = "10000000000000000" }]

# 4. Approve — fuzz allowance amount
[[spam]]
[spam.tx]
kind = "approve"
to = "{WETH9}"
from_pool = "spammer"
signature = "approve(address guy, uint256 wad) returns (bool)"
args = ["{_sender}", "5000000000000000000"]
fuzz = [{ param = "wad", min = "1000000000000000000", max = "10000000000000000000" }]
