# ERC4626 Vault deposit/withdraw spammer scenario
#
# Deploys a minimal ERC20 token (SimpleToken) and a minimal ERC4626-style vault
# (SimpleVault). Spammers repeatedly deposit and withdraw tokens to exercise
# storage-heavy DeFi patterns (balance tracking, allowances, share accounting).
#
# source: /tmp/vault.sol
# compiled with: solc --bin --optimize --optimize-runs 200

### template variables
[env]
initialSupply = "1000000000000000000000000000"

### deploy SimpleToken with initialSupply
[[create]]
name = "simpleToken"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

### deploy SimpleVault with SimpleToken address
[[create]]
name = "simpleVault"
signature = "(address asset_)"
args = ["{simpleToken}"]
bytecode = ""

## setup: admin mints tokens to self ############################################

[[setup]]
kind = "admin_mint_tokens"
to = "{simpleToken}"
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "1000000000000000000000000000"]

## setup: admin approves vault to spend tokens ##################################

[[setup]]
kind = "admin_approve_vault"
to = "{simpleToken}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{simpleVault}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## setup: admin deposits initial tokens into vault to seed it ###################

[[setup]]
kind = "admin_seed_vault"
to = "{simpleVault}"
signature = "deposit(uint256 assets) returns (uint256 shares)"
args = ["500000000000000000000000000"]
gas_limit = 200000

## setup: mint tokens to all spammer accounts ###################################

[[setup]]
kind = "spammer_mint_tokens"
to = "{simpleToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "100000000000000000000000"]

## setup: all spammer accounts approve vault ####################################

[[setup]]
kind = "spammer_approve_vault"
to = "{simpleToken}"
from_pool = "spammers"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{simpleVault}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

### SPAM

## spam: deposit tokens into vault (fuzz amount) ################################

[[spam]]
[spam.tx]
kind = "vault_deposit"
to = "{simpleVault}"
from_pool = "spammers"
signature = "deposit(uint256 assets) returns (uint256 shares)"
args = ["1000000000000000000"]
gas_limit = 200000
fuzz = [{ param = "assets", min = "1000000000000000", max = "1000000000000000000" }]

## spam: withdraw shares from vault (fuzz amount, may revert) ####################

[[spam]]
[spam.tx]
kind = "vault_withdraw"
to = "{simpleVault}"
from_pool = "spammers"
signature = "withdraw(uint256 shares) returns (uint256 assets)"
args = ["100000000000000000"]
gas_limit = 200000
fuzz = [{ param = "shares", min = "100000000000000", max = "100000000000000000" }]
