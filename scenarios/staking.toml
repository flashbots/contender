# ============================================================
# Token Staking & Rewards - Stress Test
# ============================================================
# Source: /tmp/staking.sol (StakingToken + SimpleStaking)
# Gas profile: multiple storage updates, token transfers,
#              reward calculation, mint calls per tx
# ============================================================

[env]
initialSupply = "1000000000000000000000000000"
spammerMintAmount = "1000000000000000000000000"
spammerStakeAmount = "500000000000000000000000"
rewardPoolAmount = "100000000000000000000000000"

### Deploy contracts

[[create]]
name = "StakingToken"
signature = "(uint256 initialSupply)"
args = ["{initialSupply}"]
bytecode = ""

[[create]]
name = "SimpleStaking"
signature = "(address stakingToken_)"
args = ["{StakingToken}"]
bytecode = ""

### Setup: fund the staking contract with reward tokens

[[setup]]
kind = "admin_mint_rewards"
to = "{StakingToken}"
signature = "mint(address to, uint256 amount)"
args = ["{SimpleStaking}", "{rewardPoolAmount}"]

### Setup: mint tokens to all spammer accounts

[[setup]]
kind = "spammer_mint_tokens"
to = "{StakingToken}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "{spammerMintAmount}"]

### Setup: each spammer approves the staking contract

[[setup]]
kind = "spammer_approve_staking"
to = "{StakingToken}"
from_pool = "spammer"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = ["{SimpleStaking}", "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"]

### Setup: each spammer stakes an initial amount

[[setup]]
kind = "spammer_initial_stake"
to = "{SimpleStaking}"
from_pool = "spammer"
for_all_accounts = true
signature = "stake(uint256 amount)"
args = ["{spammerStakeAmount}"]

### Spam patterns

# 1. Stake additional tokens (fuzz amount)
[[spam]]
[spam.tx]
kind = "stake"
to = "{SimpleStaking}"
from_pool = "spammer"
signature = "stake(uint256 amount)"
args = ["50000000000000000"]
fuzz = [{ param = "amount", min = "1000000000000000", max = "100000000000000000" }]

# 2. Unstake tokens (fuzz amount, with gas_limit)
[[spam]]
[spam.tx]
kind = "unstake"
to = "{SimpleStaking}"
from_pool = "spammer"
signature = "unstake(uint256 amount)"
args = ["5000000000000000"]
gas_limit = 200000
fuzz = [{ param = "amount", min = "100000000000000", max = "10000000000000000" }]

# 3. Claim rewards (gas_limit set)
[[spam]]
[spam.tx]
kind = "claim_rewards"
to = "{SimpleStaking}"
from_pool = "spammer"
signature = "claimRewards()"
args = []
gas_limit = 200000

# 4. Compound rewards (gas_limit set)
[[spam]]
[spam.tx]
kind = "compound"
to = "{SimpleStaking}"
from_pool = "spammer"
signature = "compound()"
args = []
gas_limit = 200000
