## Spam 1: submit new transactions to the multisig
[[spam]]
[spam.tx]
kind = "submit_transaction"
to = "{MultiSig}"
from_pool = "submitters"
signature = "function submitTransaction(address to, uint256 value, bytes memory data) external returns (uint256)"
args = ["{_sender}", "1000000000000", "0x"]

## Spam 2: confirm existing transactions (may revert if already confirmed or txId doesn't exist)
[[spam]]
[spam.tx]
kind = "confirm_transaction"
to = "{MultiSig}"
from_pool = "confirmers"
signature = "function confirmTransaction(uint256 txId) external"
args = ["0"]
gas_limit = 120000
fuzz = [
    { param = "txId", min = "0", max = "99" },
]

## Spam 3: execute transactions (may revert if not enough confirmations)
[[spam]]
[spam.tx]
kind = "execute_transaction"
to = "{MultiSig}"
from_pool = "executors"
signature = "function executeTransaction(uint256 txId) external"
args = ["0"]
gas_limit = 150000
fuzz = [
    { param = "txId", min = "0", max = "99" },
]
