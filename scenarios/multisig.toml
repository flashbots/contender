# ============================================================
# SimpleMultiSig - Multi-Signature Wallet Stress Test
# ============================================================
# Source: /tmp/multisig.sol (Solidity 0.8.26, optimized with 200 runs)
# Gas profile: ~90k submitTransaction, ~65k confirmTransaction,
#              ~45k executeTransaction (varies with external call),
#              ~35k revokeConfirmation
# Patterns: dynamic array growth, nested mappings, external calls,
#           event emissions, require checks
# ============================================================

[env]
max_tx_id = "99"

## Deploy the multisig contract with requiredConfirmations = 2
[[create]]
name = "MultiSig"
bytecode = ""
signature = "constructor(uint256)"
args = ["2"]


## Setup: fund the multisig contract with ETH (plain transfer, no calldata)
[[setup]]
kind = "fund_multisig"
to = "{MultiSig}"
value = "10 eth"

## Setup: submit 10 initial transactions (IDs 0-9) from admin
[[setup]]
kind = "submit_tx_0"
to = "{MultiSig}"
signature = "function submitTransaction(address to, uint256 value, bytes memory data) external returns (uint256)"
args = ["{_sender}", "1000000000000000", "0x"]

[[setup]]
kind = "submit_tx_1"
to = "{MultiSig}"
signature = "function submitTransaction(address to, uint256 value, bytes memory data) external returns (uint256)"
args = ["{_sender}", "2000000000000000", "0x"]

