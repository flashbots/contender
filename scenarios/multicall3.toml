# ============================================================
# Multicall3 Batched Transactions Stress Test
# ============================================================
# Source: /tmp/multicall.sol (Solidity 0.8.26, optimized with 200 runs)
# Tests N heterogeneous calls in a single transaction via Multicall3.
# Exercises memory expansion, loop overhead, and mixed call patterns.
#
# Contracts:
#   - Multicall3: aggregate3 / aggregate3Value for batching arbitrary calls
#   - Counter: simple increment target for batched calls
#   - SimpleToken: minimal ERC20 for mixed batches
#   - MulticallHelper: constructs Call3[] arrays and invokes aggregate3
#
# Spam patterns:
#   1. batchIncrement: 5-50 increment() calls batched via aggregate3
#   2. batchIncrementBy: 5-20 incrementBy(n) calls, n fuzzed 1-100
#   3. batchMixed: mix of increment + ERC20 transfer calls in one batch

[env]
initialSupply = "1000000000000000000000000000"

### Deploy contracts ###########################################################

[[create]]
name = "Multicall3"
bytecode = ""

[[create]]
name = "Counter"
bytecode = ""

[[create]]
name = "SimpleToken"
signature = "(uint256)"
args = ["{initialSupply}"]
bytecode = ""

[[create]]
name = "MulticallHelper"
bytecode = ""


### Setup contracts #############################################################

# Mint tokens to the MulticallHelper contract so it can do ERC20 transfers in batchMixed
[[setup]]
kind = "mint_to_helper"
to = "{SimpleToken}"
signature = "mint(address to, uint256 amount)"
args = ["{MulticallHelper}", "1000000000000000000000000000"]

# Mint tokens to each spammer account (for approvals)
[[setup]]
kind = "mint_to_spammers"
to = "{SimpleToken}"
from_pool = "spammer"
for_all_accounts = true
signature = "mint(address to, uint256 amount)"
args = ["{_sender}", "1000000000000000000000000"]

# Each spammer approves the MulticallHelper to spend their tokens
[[setup]]
kind = "approve_helper"
to = "{SimpleToken}"
from_pool = "spammer"
for_all_accounts = true
signature = "approve(address spender, uint256 amount) returns (bool)"
args = ["{MulticallHelper}", "115792089237316195423570985008687907853269984665640564039457584007913129639935"]


### Spam patterns ##############################################################

# Pattern 1: batchIncrement - fuzz `times` from 5 to 50
# Each tx batches N increment() calls through Multicall3
[[spam]]
[spam.tx]
kind = "batch_increment"
to = "{MulticallHelper}"
from_pool = "batch_small"
signature = "function batchIncrement(address multicall, address counter, uint256 times)"
args = ["{Multicall3}", "{Counter}", "25"]
fuzz = [{ param = "times", min = "5", max = "50" }]
gas_limit = 5000000

# Pattern 2: batchIncrementBy - fuzz `times` 5-20 and `n` 1-100
# Each tx batches N incrementBy(n) calls through Multicall3
[[spam]]
[spam.tx]
kind = "batch_increment_by"
to = "{MulticallHelper}"
from_pool = "batch_compute"
signature = "function batchIncrementBy(address multicall, address counter, uint256 times, uint256 n)"
args = ["{Multicall3}", "{Counter}", "10", "50"]
fuzz = [
    { param = "times", min = "5", max = "20" },
    { param = "n", min = "1", max = "100" }
]
gas_limit = 3000000

# Pattern 3: batchMixed - fuzz numIncrements 3-10 and numTransfers 3-10
# Mixes Counter.increment() calls with ERC20 self-transfers in one batch
[[spam]]
[spam.tx]
kind = "batch_mixed"
to = "{MulticallHelper}"
from_pool = "batch_mixed"
signature = "function batchMixed(address multicall, address counter, address token, uint256 numIncrements, uint256 numTransfers, uint256 transferAmount)"
args = ["{Multicall3}", "{Counter}", "{SimpleToken}", "5", "5", "1000000000000000000"]
fuzz = [
    { param = "numIncrements", min = "3", max = "10" },
    { param = "numTransfers", min = "3", max = "10" }
]
gas_limit = 5000000
