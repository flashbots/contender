# Simple AMM (Constant Product Market Maker) scenario
#
# Deploys a simplified Uniswap V2-style AMM with two ERC20 tokens.
# Tests the classic AMM gas pattern: reserve reads, balance updates,
# fee calculations (0.3%), and the x*y=k invariant.
#
# Contracts:
#   - AMMToken: Minimal ERC20 with public mint
#   - SimpleAMM: Constant product AMM with addLiquidity, removeLiquidity, swapAForB, swapBForA
#   - AMMHelper: Holds tokens and proxies swap/liquidity calls (so spammers don't need token balances)
#
# source: /tmp/amm.sol
# compiled with: solc --bin --optimize --optimize-runs 200 /tmp/amm.sol

[env]
initialSupply = "1000000000000000000000000000"
liquidityAmount = "100000000000000000000000"
helperFunds = "500000000000000000000000"


### Deploy contracts ###########################################################

[[create]]
name = "TokenA"
signature = "(string memory name_, uint256 initialSupply)"
args = ["TokenA", "{initialSupply}"]
# AMMToken bytecode
bytecode = ""

[[create]]
name = "TokenB"
signature = "(string memory name_, uint256 initialSupply)"
args = ["TokenB", "{initialSupply}"]
# AMMToken bytecode (same contract, different constructor args)
bytecode = ""

[[create]]
name = "SimpleAMM"
signature = "(address tokenA_, address tokenB_)"
args = ["{TokenA}", "{TokenB}"]
# SimpleAMM bytecode
bytecode = ""

[[create]]
name = "AMMHelper"
signature = "(address amm_, address tokenA_, address tokenB_)"
args = ["{SimpleAMM}", "{TokenA}", "{TokenB}"]
# AMMHelper bytecode - holds tokens, proxies swaps so spammers don't need token balances
bytecode = ""


### Setup contracts #############################################################

## Approve AMM to spend admin's tokens (for initial liquidity)

[[setup]]
kind = "admin_approve_amm_tokenA"
to = "{TokenA}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SimpleAMM}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

[[setup]]
kind = "admin_approve_amm_tokenB"
to = "{TokenB}"
signature = "approve(address spender, uint256 amount) returns (bool)"
args = [
    "{SimpleAMM}",
    "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff",
]

## Add initial liquidity (large amounts for deep pool)

[[setup]]
kind = "admin_add_initial_liquidity"
to = "{SimpleAMM}"
signature = "addLiquidity(uint256 amountA, uint256 amountB) returns (uint256 shares)"
args = ["{liquidityAmount}", "{liquidityAmount}"]
gas_limit = 300000

## Fund the AMMHelper contract with tokens for spammer swaps

[[setup]]
kind = "fund_helper_tokenA"
to = "{TokenA}"
signature = "function transfer(address to, uint256 amount) external returns (bool)"
args = ["{AMMHelper}", "{helperFunds}"]

[[setup]]
kind = "fund_helper_tokenB"
to = "{TokenB}"
signature = "function transfer(address to, uint256 amount) external returns (bool)"
args = ["{AMMHelper}", "{helperFunds}"]


### Spam patterns ##############################################################

# Swap TokenA for TokenB via helper (spammers don't need token balances)
# Fuzz amountIn from 0.001 to 1 token (1e15 to 1e18 wei)
[[spam]]
[spam.tx]
kind = "simple_amm_swap_a_for_b"
to = "{AMMHelper}"
from_pool = "spammer"
signature = "function swapAForB(uint256 amountIn) external returns (uint256)"
args = ["1000000000000000"]
fuzz = [{ param = "amountIn", min = "1000000000000000", max = "1000000000000000000" }]

# Swap TokenB for TokenA via helper
# Fuzz amountIn from 0.001 to 1 token (1e15 to 1e18 wei)
[[spam]]
[spam.tx]
kind = "simple_amm_swap_b_for_a"
to = "{AMMHelper}"
from_pool = "spammer"
signature = "function swapBForA(uint256 amountIn) external returns (uint256)"
args = ["1000000000000000"]
fuzz = [{ param = "amountIn", min = "1000000000000000", max = "1000000000000000000" }]

# Add liquidity via helper (smaller amounts to avoid draining helper funds)
# Fuzz both amounts from 0.001 to 0.01 tokens
[[spam]]
[spam.tx]
kind = "simple_amm_add_liquidity"
to = "{AMMHelper}"
from_pool = "spammer"
signature = "function addLiquidity(uint256 amountA, uint256 amountB) external returns (uint256)"
args = ["1000000000000000", "1000000000000000"]
fuzz = [
    { param = "amountA", min = "1000000000000000", max = "10000000000000000" },
    { param = "amountB", min = "1000000000000000", max = "10000000000000000" },
]
